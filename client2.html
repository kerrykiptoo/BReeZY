<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client 2 Store — Powered by Breezy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:#F5F2ED;color:#0A0A0B;min-height:100vh;display:flex;flex-direction:column;}
.header{padding:24px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Caveat',cursive;font-size:32px;font-weight:700;}
.logo span{color:#1ABFA0;}
.seller-link a{font-size:12px;color:#1ABFA0;text-decoration:none;font-weight:600;}
.hero{padding:40px 32px 20px;text-align:center;}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px;}
.hero p{font-size:15px;color:#6B6860;max-width:480px;margin:0 auto;}
.chat-wrap{flex:1;padding:20px 32px 32px;display:flex;flex-direction:column;}
iframe{flex:1;min-height:500px;border:none;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.powered{text-align:center;padding:16px;font-size:12px;color:#6B6860;}
.powered span{color:#1ABFA0;font-weight:600;}
@media(max-width:768px){
  .header{padding:16px;}
  .hero{padding:24px 16px 12px;}
  .hero h1{font-size:22px;}
  .chat-wrap{padding:12px 16px 16px;}
  iframe{min-height:450px;}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">BRee<span>Z</span>Y</div>
  <div class="seller-link"><a href="/dashboard.html">Seller login →</a></div>
</div>
<div class="hero">
  <h1>Welcome to Client 2 Store 👋</h1>
  <p>Browse our collection, pay securely and get a confirmation — all in one conversation.</p>
</div>
<div class="chat-wrap">
  <iframe src="https://www.uchat.com.au/p/web/3mqg0rm2p5hxf5jh/full?ref=wf239377w145581"></iframe>
</div>
<div class="powered">Powered by <span>Breezy</span></div>
</body>
</html>
